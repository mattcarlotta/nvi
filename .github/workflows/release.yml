name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        # TODO: Use ubuntu-latest if GA supports an aliased latest arm version
        os: [ubuntu-24.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build nob (POSIX)
        if: runner.os != 'Windows'
        run: clang -o nob nob.c

      - name: Build nob (Windows)
        if: runner.os == 'Windows'
        run: cl nob nob.c

      - name: Run tests (POSIX)
        if: runner.os != 'Windows'
        run: ./nob test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .\nob.exe test

  build:
    name: Build ${{ matrix.target.archive }}
    needs: test
    strategy:
      fail-fast: true
      matrix:
        target:
          - { archive: "linux-x86_64",      os: ubuntu-24.04,     ext: "",     format: "tar.gz", libc: "" }
          - { archive: "linux-x86_64-musl", os: ubuntu-24.04,     ext: "",     format: "tar.gz", libc: "musl" }
          - { archive: "linux-aarch64",     os: ubuntu-24.04-arm, ext: "",     format: "tar.gz", libc: "" }
          - { archive: "macos-aarch64",     os: macos-latest,     ext: "",     format: "tar.gz", libc: "" }
          - { archive: "windows-x86_64",    os: windows-latest,   ext: ".exe", format: "zip",    libc: "" }
    runs-on: ${{ matrix.target.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install lld
        if: runner.os == 'Linux' && matrix.target.libc != 'musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y lld

      - name: Install musl toolchain
        if: matrix.target.libc == 'musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        env:
          NVI_LIBC: ${{ matrix.target.libc }}
        run: |
          clang -o nob nob.c
          ./nob release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cl nob.c
          .\nob.exe release

      - name: Package (POSIX)
        if: runner.os != 'Windows'
        run: |
          bin="nvi${{ matrix.target.ext }}"
          mkdir -p dist/nvi/bin
          cp "$bin" "dist/nvi/bin/$bin"
          tar -czvf "nvi-${{ matrix.target.archive }}.tar.gz" -C dist nvi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/nvi/bin | Out-Null
          Copy-Item nvi.exe dist/nvi/bin/nvi.exe
          Compress-Archive -Path dist/nvi -DestinationPath "nvi-${{ matrix.target.archive }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvi-${{ matrix.target.archive }}
          path: nvi-${{ matrix.target.archive }}.${{ matrix.target.format }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: nvi-*
          merge-multiple: true

      - name: Publish release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --generate-notes \
            --title "$TAG" \
            dist/*
