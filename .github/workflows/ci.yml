name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.MD"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.MD"
      - ".gitignore"

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.cc }})
    strategy:
      fail-fast: false
      matrix:
        # TODO: Use ubuntu-latest if GA supports an aliased latest arm version
        os: [ubuntu-24.04, macos-latest, windows-latest]
        cc: [clang]
        include:
          - os: ubuntu-24.04
            cc: gcc
    runs-on: ${{ matrix.os }}
    env:
      NVI_CC: ${{ matrix.cc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install lld
        if: runner.os == 'Linux' && matrix.cc == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y lld

      - name: Build nob (POSIX)
        if: runner.os != 'Windows'
        run: ${{ matrix.cc }} -o nob nob.c

      - name: Build nob (Windows)
        if: runner.os == 'Windows'
        run: cl nob nob.c

      - name: Run tests (POSIX)
        if: runner.os != 'Windows'
        run: ./nob test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .\nob.exe test

      - name: Release build (POSIX)
        if: runner.os != 'Windows'
        run: ./nob release

      - name: Release build (Windows)
        if: runner.os == 'Windows'
        run: .\nob.exe release
